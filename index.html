<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نادي التمريض والعلوم الصحية | بطاقة الخريجين</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @font-face {
            font-family: 'BukraFont';
            src: url('bukra.ttf'); 
        }
        
        body { 
            font-family: 'BukraFont', 'Arial', sans-serif; 
            margin: 0; padding: 0;
            background: #f8fafc;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #ffffff 0%, #0c4a6e 100%); 
            z-index: -2;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="text-gray-900 min-h-screen flex flex-col p-4 sm:p-8 relative">

<div class="w-full max-w-2xl m-auto p-6 sm:p-10 relative z-10 text-center main-card rounded-[2.5rem] shadow-2xl">
    
    <div class="flex justify-center mb-6">
        <img src="nursing-logo.png" alt="شعار نادي التمريض" class="h-24 w-auto drop-shadow-md">
    </div>

    <h1 class="text-3xl sm:text-4xl font-extrabold mb-2 text-[#0c4a6e]">تهنئة تخرج</h1>
    <p class="text-gray-600 mb-8">نادي التمريض والعلوم الصحية يبارك لكم هذا الإنجاز</p>
    
    <div class="space-y-4 mb-8">
        <div class="text-right">
            <label class="block text-[#0c4a6e] font-bold mb-2 mr-2">اسم الخريج/ـة:</label>
            <input type="text" id="nameInput" placeholder="اكتب الاسم هنا..." 
                   class="w-full px-6 py-4 rounded-2xl text-lg text-center outline-none border-2 border-gray-100 focus:border-[#0c4a6e] transition-all shadow-sm">
        </div>
    </div>
    
    <div class="flex flex-col gap-4">
        <button onclick="generateGraduationCard()" 
                class="w-full bg-[#0c4a6e] hover:bg-[#075985] text-white font-bold py-5 rounded-2xl shadow-lg transform transition active:scale-95 text-xl flex justify-center items-center gap-2">
            إصدار بطاقة التخرج ✨
        </button>
        
        <button id="downloadBtn" onclick="downloadCard()" style="display:none;" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all flex justify-center items-center gap-2">
            📥 حفظ البطاقة بجودة عالية
        </button>
    </div>
    
    <div id="canvasWrapper" class="hidden mt-10 transition-all duration-700 scale-90 opacity-0">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const baseImage = new Image();

    // مسار الصورة الأساسية
    baseImage.src = 'grad-card-bg.jpg'; 

    async function generateGraduationCard() {
        const name = document.getElementById('nameInput').value.trim();
        
        if (!name) {
            Swal.fire({ icon: 'error', title: 'عفواً', text: 'يرجى كتابة اسم الخريج', confirmButtonColor: '#0c4a6e' });
            return;
        }

        // التأكد من تحميل خلفية البطاقة قبل الرسم
        if (!baseImage.complete) {
            await new Promise((resolve) => {
                baseImage.onload = resolve;
                baseImage.onerror = () => Swal.fire('خطأ', 'تعذر تحميل صورة الخلفية', 'error');
            });
        }

        canvas.width = baseImage.width || 1000; 
        canvas.height = baseImage.height || 1400;

        // رسم الخلفية
        ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height);

        // إضافة الاسم في المستطيل المخصص
        ctx.font = "bold 50px 'BukraFont'";
        ctx.fillStyle = "#0c4a6e"; 
        ctx.textAlign = "center";
        
        // استخدام الإحداثي الدقيق 39.50%
        const nameYPosition = canvas.height * 0.395; 
        ctx.fillText(name, canvas.width / 2, nameYPosition); 

        // إظهار النتائج
        const wrapper = document.getElementById('canvasWrapper');
        wrapper.classList.remove('hidden');
        setTimeout(() => {
            wrapper.classList.add('scale-100', 'opacity-100');
            document.getElementById('downloadBtn').style.display = 'flex';
        }, 100);

        // تأثير الاحتفال
        confetti({ particleCount: 150, spread: 100, origin: { y: 0.7 } });
    }

    function downloadCard() {
        const link = document.createElement('a');
        link.download = `نادي_التمريض_تخرج_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
